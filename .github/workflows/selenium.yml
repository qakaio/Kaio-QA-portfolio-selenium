name: Selenium CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 2AM
  workflow_dispatch:

env:
  HEADLESS: true

jobs:
  test:
    name: Selenium Tests (Chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Chrome
        run: |
          # Use system Chrome (pre-installed on ubuntu-latest)
          which google-chrome || which chromium || which chromium-browser
          google-chrome --version || chromium --version || chromium-browser --version
          echo "CHROME_BIN=$(which google-chrome || which chromium || which chromium-browser)" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Run Selenium tests
        run: npm test
        env:
          CHROME_BINAME_BIN: ${{ env.CHROME_BIN }}
          HEADLESS: true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: screenshots/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run lint